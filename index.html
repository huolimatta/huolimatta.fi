<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huolimatta</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cream: #faf8f4;
            --warm-white: #f5f0eb;
            --sage-dark: #5c6e58;
            --text-light: #6b6b68;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            background: linear-gradient(180deg, var(--cream) 0%, var(--warm-white) 100%);
            color: var(--text-light);
        }

        .container {
            text-align: center;
        }

        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 400;
            font-size: clamp(3rem, 8vw, 6rem);
            color: var(--sage-dark);
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .tagline {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 400;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Huolimatta</h1>
        <p class="tagline">Pysähdy. Hengitä. Palaa itseesi.</p>
    </div>
</body>
</html>
